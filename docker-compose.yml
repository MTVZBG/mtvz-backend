version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: myshop_postgres
    restart: always
    environment:
      POSTGRES_USER: myshop
      POSTGRES_PASSWORD: myshoppass
      POSTGRES_DB: myshopdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mtvz-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
